name: Lead Generator

on:
  workflow_dispatch:
    inputs:
      industry:
        description: "Industry"
        required: true
        default: "Realtor"

      city:
        description: "City"
        required: true
        default: "Charlotte"

      state:
        description: "State"
        required: true
        default: "NC"

      leads:
        description: "Number of Leads"
        required: true
        default: "500"

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run scraper
        env:
          SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
        run: |
          python realtor_scraper.py \
            "${{ github.event.inputs.industry }}" \
            "${{ github.event.inputs.city }}" \
            "${{ github.event.inputs.state }}" \
            "${{ github.event.inputs.leads }}"

      - name: Upload Excel
        uses: actions/upload-artifact@v4
        with:
          name: leads
          path: output/*.xlsx